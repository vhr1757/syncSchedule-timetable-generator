<!doctype html>
<html>
<head>
  <title>Add Subject</title>

  <style>
    body { margin:0; font-family: Arial; background:#f4f6f8; }

    .navbar {
      background:#4e73df; color:white;
      padding:14px 30px;
      display:flex; justify-content:space-between;
    }

    .nav-right button {
      background:white; color:#4e73df;
      border:none; padding:6px 12px;
      border-radius:5px; cursor:pointer;
    }

    .main-container { padding:30px; }

    .form-card {
      background:white;
      padding:25px;
      border-radius:8px;
      max-width:500px;
      box-shadow:0 0 8px rgba(0,0,0,0.05);
    }

    .form-group { margin-bottom:15px; }

    input {
      width:100%;
      padding:8px;
      border:1px solid #ccc;
      border-radius:4px;
    }

    .btn-primary {
      background:#4e73df;
      color:white;
      border:none;
      padding:10px 15px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div>Admin Panel</div>
  <div class="nav-right">
    <a href="{% url 'admin_home' %}"><button>Dashboard</button></a>
    <a href="{% url 'login' %}"><button>Logout</button></a>
  </div>
</nav>

<div class="main-container">
  <h2>Add Subject</h2>

  <div class="form-card">
    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <input type="text" name="subject_code" placeholder="Subject Code" required>
      </div>

      <div class="form-group">
        <input type="text" name="subject_name" placeholder="Subject Name" required>
      </div>

      <div class="form-group">
        <input type="number" name="semester" placeholder="Semester" required>
      </div>

      <div class="form-group">
        <input type="number" name="lecture_hours" placeholder="Lecture Hours" required>
      </div>

      <div class="form-group">
        <input type="number" name="lab_hours" placeholder="Lab Hours">
      </div>

      <button class="btn-primary">Add Subject</button>
    </form>

    {% if error %}
      <p style="color:red">{{ error }}</p>
    {% endif %}

    {% if success %}
      <p style="color:green">{{ success }}</p>
    {% endif %}

    <a href="{% url 'manage_subjects' %}">
      <button style="margin-top:10px;">Back</button>
    </a>
  </div>
</div>

</body>
</html>
