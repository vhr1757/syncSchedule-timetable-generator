{% load static %}
<!DOCTYPE html>
<style>
  body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

.page-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.form-card {
  background: white;
  padding: 30px 40px;
  border-radius: 12px;
  width: 700px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-card h2 {
  margin-bottom: 25px;
  color: #222;
}

.form-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.form-group label {
  margin-bottom: 6px;
  font-weight: 500;
  color: #333;
}

.form-group input {
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.form-group input:focus {
  outline: none;
  border-color: #4e73df;
}

.form-actions {
  margin-top: 20px;
  display: flex;
  gap: 15px;
}

.btn-primary {
  background: #4e73df;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.btn-primary:hover {
  background: #3b5dcc;
}

.btn-secondary {
  background: #e0e0e0;
  color: #333;
  padding: 10px 18px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 14px;
}

.error {
  color: red;
  margin-bottom: 15px;
}
</style>
<html>
<head>
  <title>Add Faculty</title>
  <link rel="stylesheet" href="{% static 'generator/form.css' %}">
</head>
<body>

<div class="page-wrapper">
  <div class="form-card">
    <h2>Add Faculty Details</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>

        <div class="form-group">
          <label>Role</label>
          <input type="text" value="FACULTY" disabled>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Save Faculty</button>
        <a href="{% url 'manage_users' %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
