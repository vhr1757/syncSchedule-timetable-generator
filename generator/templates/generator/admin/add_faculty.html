{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Faculty</title>
<link rel="stylesheet" href="{% static 'generator/form.css' %}">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">Admin Panel</div>
  <div class="nav-right">
    <a href="{% url 'admin_home' %}"><button>Dashboard</button></a>
    <a href="{% url 'login' %}"><button>Logout</button></a>
  </div>
</nav>

<div class="form-page-container">
<h2>Add Faculty</h2>

<div class="form-box">
<h3>Faculty Details</h3>

<form method="POST">
{% csrf_token %}

<div class="form-row">
  <div class="form-group"><label>Name</label>
  <input type="text" name="name" required></div>

  <div class="form-group"><label>Email</label>
  <input type="email" name="email" required></div>
</div>

<div class="form-row">
  <div class="form-group"><label>Department</label>
  <input type="text" name="department" required></div>

  <div class="form-group"><label>Subject</label>
  <input type="text" name="subject" required></div>
</div>

<div class="form-group">
<label>Max Hours per Week</label>
<input type="number" name="max_hours" required>
</div>

<div class="form-actions">
<button class="form-btn" type="submit">Save Faculty</button>
<a href="{% url 'manage_users' %}" class="form-cancel">Cancel</a>
</div>
</form>
</div>
</div>
</body>
</html>
