{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>
<link rel="stylesheet" href="{% static 'generator/form.css' %}">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">Admin Panel</div>
  <div class="nav-right">
    <a href="{% url 'admin_home' %}"><button>Dashboard</button></a>
    <a href="{% url 'login' %}"><button>Logout</button></a>
  </div>
</nav>

<div class="form-page-container">
<h2>Add Student</h2>

<div class="form-box">
<h3>Student Details</h3>

<form method="POST">
{% csrf_token %}

<div class="form-row">
  <div class="form-group"><label>Name</label>
  <input type="text" name="name" required></div>

  <div class="form-group"><label>Roll No</label>
  <input type="text" name="roll_no" required></div>
</div>

<div class="form-row">
  <div class="form-group">
  <label>Semester</label>
  <select name="semester" required>
    <option>2</option><option>4</option><option>6</option><option>8</option>
  </select>
  </div>

  <div class="form-group">
  <label>Batch</label>
  <select name="batch" required>
    <option>A1</option><option>A2</option><option>B1</option><option>B2</option>
  </select>
  </div>
</div>

<div class="form-group">
<label>Department</label>
<input type="text" name="department" required>
</div>

<div class="form-actions">
<button class="form-btn" type="submit">Save Student</button>
<a href="{% url 'manage_users' %}" class="form-cancel">Cancel</a>
</div>

</form>
</div>
</div>
</body>
</html>
