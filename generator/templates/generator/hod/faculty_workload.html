<!doctype html>
<html>
  <head>
    <title>Faculty Workload</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f4f6f8;
      }

      .navbar {
        background: #4e73df;
        color: white;
        padding: 14px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-left {
        font-size: 20px;
        font-weight: 600;
      }

      .nav-right button {
        background: white;
        color: #4e73df;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
      }

      .main-container {
        padding: 30px;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
        margin-bottom: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #4e73df;
        color: white;
        padding: 10px;
        text-align: left;
      }

      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      tr:hover {
        background: #f1f3ff;
      }

      .overload {
        color: red;
        font-weight: bold;
      }

      .btn-secondary {
        background: gray;
        color: white;
        border: none;
        padding: 8px 15px;
        margin-top: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">HOD Panel</div>

      <div class="nav-right">
        <a href="{% url 'hod_home' %}">
          <button>Dashboard</button>
        </a>
        <a href="{% url 'login' %}"><button>Logout</button></a>
      </div>
    </nav>

    <div class="main-container">
      <h2>Faculty Workload Overview</h2>

      <div class="card">
        <table>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Assigned Hours</th>
            <th>Allowed Hours</th>
            <th>Status</th>
          </tr>

          {% for f in faculty_data %}

          <tr>
            <td>{{f.name}}</td>

            <td>{{f.email}}</td>

            <td>{{f.assigned_hours}}</td>

            <td>{{f.allowed_hours}}</td>

            <td>
              {% if f.assigned_hours > f.allowed_hours %}
              <span class="overload">Overloaded</span>
              {% else %} Normal {% endif %}
            </td>
          </tr>

          {% endfor %}
        </table>

        <a href="{% url 'hod_home' %}">
          <button class="btn-secondary">Back</button>
        </a>
      </div>
    </div>
  </body>
</html>
