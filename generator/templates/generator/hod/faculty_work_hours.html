<!doctype html>
<html>
  <head>
    <title>Faculty Work Hours</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f4f6f8;
      }
      .navbar {
        background: #4e73df;
        color: white;
        padding: 14px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .nav-left {
        font-size: 20px;
        font-weight: 600;
      }
      .nav-right button {
        background: white;
        color: #4e73df;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
      }
      .main-container {
        padding: 30px;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #4e73df;
        color: white;
        padding: 10px;
        text-align: left;
      }
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      tr:hover {
        background: #f1f3ff;
      }
      .btn-secondary {
        background: gray;
        color: white;
        border: none;
        padding: 8px 15px;
        margin-top: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">HOD Panel</div>
      <div class="nav-right">
        <a href="{% url 'hod_home' %}"><button>Dashboard</button></a>
      </div>
    </nav>

    <div class="main-container">
      <h2>Faculty Work Hours</h2>

      <div class="card">
        <table>
          <tr>
            <th>Faculty Name</th>
            <th>Total Assigned Hours</th>
          </tr>

          {% for f in faculty_data %}
          <tr>
            <td>{{ f.faculty_username }}</td>
            <td>{{ f.total_hours }}</td>
          </tr>
          {% endfor %}
        </table>

        <a href="{% url 'hod_home' %}">
          <button class="btn-secondary">Back</button>
        </a>
      </div>
    </div>
  </body>
</html>
